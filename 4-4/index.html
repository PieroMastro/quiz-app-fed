<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Math App</title>
</head>

<body>
    <header>
        <div class="container">
            <h3 id="result-display" class="result">Haz Click en la Respuesta Correcta!</h3>
        </div>
    </header>

    <main id="game-container">
        <div class="start-button">
            Iniciar!
        </div>
        <div class="main-container">
            <div class="question">10 + 10</div>
            <div class="options-container">
                <div class="answer-button">20</div>
                <div class="answer-button">15</div>
                <div class="answer-button">12</div>
                <div class="answer-button">8</div>
                <div class="answer-button">32</div>
            </div>
        </div>
    </main>

    <footer>
        Made with 💜 by <a href="https://github.com/PieroMastro" target="_blank">PieroMastro</a>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
    <script src="app.js"></script>
</body>

</html>
